<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!--
    Plated wordmark — light tile. Requires Fraunces (600 SemiBold) to render
    as designed; falls back to the viewer's serif if unavailable. Matches
    icon-full.svg's gradient exactly so the two marks read as one family.
    Source of truth for assets/images/icon.png (regenerate via the same
    gradient + Fraunces 600, centered, ~148px font-size on this 1024 canvas —
    see design/handoff/README.md §8 for the spec).
  -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F4B12A"/>
      <stop offset="1" stop-color="#D9830B"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" fill="url(#bg)"/>
  <text x="512" y="552" text-anchor="middle" font-family="Fraunces, serif" font-weight="600"
        font-size="148" letter-spacing="-4" fill="#F8EFD8">Plated</text>
</svg>
