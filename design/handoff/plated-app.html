  const inactive = overlay ? 'rgba(255,255,255,0.85)' : 'var(--text-muted)';
  const seg = (m, label) => (
    <button onClick={() => setMode(m)} style={{ padding:'8px 16px', borderRadius:999, border:'none', cursor:'pointer', fontWeight:800, fontSize:13,
      background: mode===m ? 'var(--accent)' : 'transparent', color: mode===m ? 'var(--accent-text)' : inactive }}>{label}</button>
  );
  return (
    <div style={{ display:'flex', background:bg, borderRadius:999, padding:3 }}>
      {seg('platos','Platos')}{seg('discover','Discover')}{seg('map','Map')}

}

function ExploreMap({ onSelect, saved, query, mapTheme, activeTypes, hitOnly }) {
  const ref = React.useRef(null);
  const mapRef = React.useRef(null);
  const layerRef = React.useRef(null);
  React.useEffect(() => {
    const map = window.L.map(ref.current, { zoomControl:false, attributionControl:true }).setView([41.8955, -87.643], 13);
    window.L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution:'© OpenStreetMap contributors', maxZoom:19 }).addTo(map);
    layerRef.current = window.L.layerGroup().addTo(map);
    mapRef.current = map;
    setTimeout(() => map.invalidateSize(), 200);
    return () => map.remove();
  }, []);
  React.useEffect(() => {
    const layer = layerRef.current;
    if (!layer) return;
    layer.clearLayers();
    const q = (query || '').trim().toLowerCase();
    CHI.filter((r) => (!q || r.name.toLowerCase().includes(q) || r.cuisine.toLowerCase().includes(q) || r.area.toLowerCase().includes(q))
        && activeTypes.includes(r.type) && (!hitOnly || saved.includes(r.id))).forEach((r) => {
      const isSaved = saved.includes(r.id);
      const p = PIN_ICON[r.type];
      const icon = window.L.divIcon({ className:'', iconSize:[62,34], iconAnchor:[31,34], html:
        `<div style="display:flex;align-items:center;gap:5px;background:#FFFDF8;padding:4px 9px 4px 4px;border-radius:999px;box-shadow:0 4px 10px rgba(37,27,16,0.32);border:2px solid ${isSaved ? '#B07207' : '#fff'}">
          <span style="width:20px;height:20px;border-radius:50%;background:${p.color};display:flex;align-items:center;justify-content:center"><svg viewBox="0 0 24 24" width="13" height="13" fill="#fff">${p.svg}</svg></span>
          <span style="color:#1A1413;font:800 13px/1 -apple-system,sans-serif">${r.rating.toFixed(1)}</span>
          ${isSaved ? '<span style="color:#B07207;font-size:12px;margin-left:-1px">&#9733;</span>' : ''}
        </div>` });
      window.L.marker([r.lat, r.lng], { icon }).addTo(layer).on('click', () => onSelect(r));
    });
  }, [saved, query, activeTypes, hitOnly]);
  return <div ref={ref} className={`plated-map ${mapTheme}`} style={{ position:'absolute', inset:0, zIndex:0 }} />;
}

function itemLabel(item) {
  if (item.type === 'restaurant') { const r = CHI.find((x) => x.id === item.id); return r ? { title:r.name, sub:`${r.cuisine} · ${r.area}`, rating:r.rating, restaurant:r } : null; }
  return { title:item.name, sub:item.sub, rating:item.rating, restaurant:null };
}

function App() {
  const [tab, setTab] = React.useState('index');
  const [creating, setCreating] = React.useState(false);
  const [signedIn, setSignedIn] = React.useState(false);
  const [appTheme, setAppTheme] = React.useState('saffron');
  const [saveTarget, setSaveTarget] = React.useState(null);
  const [collections, setCollections] = React.useState(() => {
    try { const c = JSON.parse(localStorage.getItem('plated.collections') || 'null'); if (c && Array.isArray(c)) return c; } catch {}
    return [ { id:'want', name:'Want to try', system:true, items:[] }, { id:'fav', name:'Favorites', system:true, items:[] } ];
  });
  const persist = (next) => { setCollections(next); try { localStorage.setItem('plated.collections', JSON.stringify(next)); } catch {} };
  const savedIds = [...new Set(collections.flatMap((c) => c.items.filter((i) => i.type === 'restaurant').map((i) => i.id)))];
  const toggleInCollection = (collectionId, item) => persist(collections.map((c) => {
    if (c.id !== collectionId) return c;
    const has = c.items.some((i) => i.type === item.type && i.id === item.id);
    return { ...c, items: has ? c.items.filter((i) => !(i.type === item.type && i.id === item.id)) : [...c.items, item] };
  }));
  const createCollection = (name, firstItem) => { const id = 'c' + Date.now(); persist([...collections, { id, name, items: firstItem ? [firstItem] : [] }]); return id; };
  const store = { collections, savedIds, isSaved:(id) => savedIds.includes(id), toggleInCollection, createCollection, openSave:setSaveTarget };
  const screens = { index:<Home store={store} />, explore:<Explore store={store} />, leaderboard:<Ranks/>, profile:<Profile appTheme={appTheme} setAppTheme={setAppTheme} store={store} /> };
  return (
    <Phone theme={appTheme}>
      {!signedIn ? (
        <Onboarding onStart={() => setSignedIn(true)} />
      ) : (
        <>
          <div style={{ flex:1, display:'flex', flexDirection:'column', position:'relative', minHeight:0 }}>
            {screens[tab]}
            {creating && <CreateFlow onDone={() => setCreating(false)} />}
            {saveTarget && <SaveSheet item={saveTarget} collections={collections} onClose={() => setSaveTarget(null)} onToggle={toggleInCollection} onCreate={createCollection} />}
          </div>
          <TabBar active={tab} onChange={setTab} onCreate={() => setCreating(true)} createOpen={creating} />
        </>
      )}
    </Phone>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
