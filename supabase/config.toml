# Plated — Supabase CLI config.
# Generated so `supabase link` / `supabase db push` work against the existing
# project. The hosted project is the source of truth; local ports below only
# matter if you run `supabase start`.

project_id = "lfsrbkrqdvzilfkphgpq"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "plated://"
additional_redirect_urls = ["plated://"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false
